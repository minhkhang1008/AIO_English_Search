<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All in One English</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>All in One English</h1>
        <p>Type a word or phrase and press Enter</p>
        
        <!-- Input and Quick Search Button -->
        <div class="input-container">
            <input type="text" id="searchBox" placeholder="Type here" autocomplete="off">
            <button class="button" data-text="Quick Search" id="quickSearchButton">
                <span class="actual-text">&nbsp;Quick Search&nbsp;</span>
                <span aria-hidden="true" class="hover-text">&nbsp;Quick Search&nbsp;</span>
            </button>
        </div>

        <ul id="suggestionList" class="suggestion-list"></ul>
        <div id="buttonContainer" class="button-container"></div>

        <div id="creditsContainer" class="credits-container">
            <div class="update-time">
                Update 10/11/2024<br>
                <a href="https://github.com/minhkhang1008/minhkhang1008.github.io" class="source-link" target="_blank">Source code</a><br>
                <a href="https://forms.gle/K195XSHSTdk8Jdh49" class="contribute" target="_blank">Contribute Words</a>
            </div>
            <div class="credit">Made by: Nguyen Hoang Minh Khang</div>
        </div>
        <div id="definitionContainer" class="definition-container hidden">
            <!-- Close icon and content will be added dynamically -->
        </div>
    </div>

    <script>
        let words = [];
        let currentSuggestionIndex = -1;

        // Load words from the words.txt file
        fetch('words_alpha.txt')
            .then(response => response.text())
            .then(text => {
                words = text.split('\n').map(word => word.trim());
            });

        // Input event listener
        document.getElementById('searchBox').addEventListener('input', function(event) {
            let input = event.target.value.trim().toLowerCase();
            let suggestionList = document.getElementById('suggestionList');

            suggestionList.innerHTML = '';
            currentSuggestionIndex = -1; // Reset index when typing

            if (input) {
                // Filter words that start with the input
                let filteredWords = words.filter(word => word.toLowerCase().startsWith(input));
                filteredWords.forEach(word => {
                    let li = document.createElement('li');
                    li.innerHTML = highlightMatch(word, input);
                    li.addEventListener('click', function() {
                        handleSuggestionClick(word);
                    });
                    suggestionList.appendChild(li);
                });
            }
        });

        // Keydown event listener for navigation
        document.getElementById('searchBox').addEventListener('keydown', function(event) {
            let suggestionList = document.getElementById('suggestionList');
            let suggestions = suggestionList.getElementsByTagName('li');

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                currentSuggestionIndex++;
                if (currentSuggestionIndex >= suggestions.length) {
                    currentSuggestionIndex = 0;
                }
                updateSuggestionHighlight(suggestions);
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                currentSuggestionIndex--;
                if (currentSuggestionIndex < 0) {
                    currentSuggestionIndex = suggestions.length - 1;
                }
                updateSuggestionHighlight(suggestions);
            } else if (event.key === 'Enter') {
                if (currentSuggestionIndex > -1 && suggestions[currentSuggestionIndex]) {
                    event.preventDefault();
                    suggestions[currentSuggestionIndex].click();
                    currentSuggestionIndex = -1;
                }
            } else {
                // Reset index on other keys
                currentSuggestionIndex = -1;
            }
        });

        function updateSuggestionHighlight(suggestions) {
            for (let i = 0; i < suggestions.length; i++) {
                suggestions[i].classList.remove('active');
            }
            if (currentSuggestionIndex > -1 && suggestions[currentSuggestionIndex]) {
                suggestions[currentSuggestionIndex].classList.add('active');
                // Update the input value to reflect the current selection
                document.getElementById('searchBox').value = suggestions[currentSuggestionIndex].textContent;
            }
        }

        document.getElementById('quickSearchButton').addEventListener('click', function () {
            const input = document.getElementById('searchBox').value.trim().toLowerCase();
            if (input) {
                fetchDefinition(input);
                // Clear the suggestion list
                document.getElementById('suggestionList').innerHTML = '';
                currentSuggestionIndex = -1;
            }
        });

        document.getElementById('searchBox').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                let input = event.target.value.trim().toLowerCase();
                if (currentSuggestionIndex === -1) {
                    event.preventDefault();
                    if (event.shiftKey) {
                        if (input) {
                            fetchDefinition(input);
                        }
                    } else {
                        if (input) {
                            performAction(input);
                        }
                    }
                }
            }
        });

        function handleSuggestionClick(suggestion) {
            document.getElementById('searchBox').value = suggestion;
            document.getElementById('suggestionList').innerHTML = '';
            currentSuggestionIndex = -1;
        }

        function performAction(input) {
            let wordCount = input.split(/\s+/).length;
            let buttonContainer = document.getElementById('buttonContainer');
            let container = document.querySelector('.container');

            buttonContainer.innerHTML = '';
            container.classList.remove('buttons-visible');

            // Hide credits when an action is performed
            const creditsContainer = document.getElementById('creditsContainer');
            creditsContainer.classList.add('fade-out');
            setTimeout(() => {
                creditsContainer.classList.add('hidden');
                creditsContainer.classList.remove('fade-out');
            }, 500);

            if (wordCount >= 2) {
                let phrasalVerbBtn = document.createElement('button');
                phrasalVerbBtn.classList.add('action-button', 'fade-in');
                phrasalVerbBtn.innerHTML = '<img src="VJ.png" alt="Phrasal Verb Icon" class="icon"> Phrasal Verb';
                phrasalVerbBtn.onclick = function () {
                    let urlSafeWord = input.replace(/\s+/g, '-');
                    clearButtons();
                    openUrl(`https://vietjack.com/cum-dong-tu/${urlSafeWord}.jsp`);
                };

                let googleTranslateBtn = document.createElement('button');
                googleTranslateBtn.classList.add('action-button', 'fade-in');
                googleTranslateBtn.innerHTML = '<img src="ggtrans.png" alt="Translate Icon" class="icon"> Translate';
                googleTranslateBtn.onclick = function () {
                    let urlSafeText = encodeURIComponent(input);
                    clearButtons();
                    openUrl(`https://translate.google.com/?sl=en&tl=vi&text=${urlSafeText}&op=translate`);
                };

                let googleSearchBtn = document.createElement('button');
                googleSearchBtn.classList.add('action-button', 'fade-in');
                googleSearchBtn.innerHTML = '<img src="google.png" alt="Google Search Icon" class="icon"> Google Search';
                googleSearchBtn.onclick = function () {
                    let urlSafeText = encodeURIComponent(input);
                    clearButtons();
                    openUrl(`https://www.google.com/search?q=${urlSafeText}`);
                };

                buttonContainer.appendChild(phrasalVerbBtn);
                buttonContainer.appendChild(googleTranslateBtn);
                buttonContainer.appendChild(googleSearchBtn);
                container.classList.add('buttons-visible');
            } else if (wordCount === 1) {
                let urlSafeWord = input.replace(/\s+/g, '-');
                openUrl(`https://dictionary.cambridge.org/dictionary/english/${urlSafeWord}`);
            }
        }

        function clearButtons() {
            document.getElementById('buttonContainer').innerHTML = '';
            document.getElementById('searchBox').value = '';
        }

        function openUrl(url) {
            if (window.innerWidth <= 800) {
                window.location.href = url;
            } else {
                window.open(url, '_blank');
            }
        }

        function highlightMatch(word, query) {
            let regex = new RegExp(`(${query})`, 'gi');
            return word.replace(regex, '<span class="highlight">$1</span>');
        }

        async function fetchDefinition(input) {
            const definitionContainer = document.getElementById('definitionContainer');
            const creditsContainer = document.getElementById('creditsContainer');
            definitionContainer.innerHTML = ''; // Clear previous responses
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${input}`);
                const data = await response.json();
                if (Array.isArray(data) && data.length > 0) {
                    // Hide credits when definition is fetched
                    creditsContainer.classList.add('fade-out');
                    setTimeout(() => {
                        creditsContainer.classList.add('hidden');
                        creditsContainer.classList.remove('fade-out');
                    }, 500);

                    let content = '<span id="closeIcon" class="close-icon">&times;</span>';
                    content += `<h2>Definition of "${input}"</h2>`;
                    data[0].meanings.forEach(meaning => {
                        content += `<h3>${meaning.partOfSpeech}</h3>`;
                        meaning.definitions.forEach((def, index) => {
                            content += `<p>${index + 1}. ${def.definition}</p>`;
                            if (def.example) {
                                content += `<p><em>Example: ${def.example}</em></p>`;
                            }
                        });
                    });
                    definitionContainer.innerHTML = content;

                    // Remove 'hidden' class
                    definitionContainer.classList.remove('hidden');
                    // Force reflow
                    void definitionContainer.offsetWidth;
                    // Add 'expand' class
                    definitionContainer.classList.add('expand');

                    document.getElementById('closeIcon').addEventListener('click', function() {
                        // Remove 'expand' class
                        definitionContainer.classList.remove('expand');
                        // Force reflow
                        void definitionContainer.offsetWidth;
                        // Add 'hidden' class
                        definitionContainer.classList.add('hidden');

                        setTimeout(() => {
                            creditsContainer.classList.remove('hidden');
                            creditsContainer.classList.add('fade-in');
                        }, 500);
                    });
                } else {
                    alert('No definition found for this word.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to fetch definition.');
            }
        }
    </script>
</body>
</html>
