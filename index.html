<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All in One</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.png">
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Apply the animation to the buttons */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensures the body takes up the full viewport height */
            margin: 0;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
            position: relative;
        }

        .highlight {
            background-color: #ffeb3b;
            color: black;
            font-weight: bold;
        }

        /* Suggestion list */
        .suggestion-list {
            list-style-type: none;
            padding: 0;
            margin: 5px auto 0; /* Center the suggestion box */
            max-height: 150px;
            overflow-y: auto;
            background-color: rgba(106, 17, 203, 0.9); /* Use gradient start color with transparency */
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 80%;
            max-width: 400px;
            color: #fff; /* Change text color to white */
            position: absolute;
            z-index: 1000;
            left: 50%; /* Align the suggestion box to the center */
            transform: translateX(-50%);
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s;
        }

        .suggestion-item:hover {
            background-color: rgba(37, 117, 252, 0.9); /* Use gradient end color with transparency */
            color: #fff;
        }

        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 50px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            width: 100%;
            max-width: 500px;
            margin: 0 20px;
        }

        h1 {
            font-size: 2.5em;
        }

        p {
            font-size: 1.2em;
        }

        #searchBox {
            width: 100%;
            max-width: 400px;
            padding: 14px;
            border: 2px solid #fff;
            border-radius: 30px;
            font-size: 18px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            position: relative;
            z-index: 1;
            margin: 0 auto; /* Center the search box */
        }

        #searchBox:focus {
            border-color: #ffeb3b;
            box-shadow: 0 0 10px #ffeb3b;
        }

        /* Suggestions Container */
        .suggestions-container {
            margin-top: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        /* Suggestion Items */
        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .suggestion-item:hover {
            background-color: #6a11cb;
            color: #fff;
        }

        /* Button Container */
        .button-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* Action Buttons */
        .action-button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #6a11cb;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-button img.icon {
            width: 20px;
            height: 20px;
        }

        .action-button:hover {
            background-color: #2575fc;
        }

        .action-button:active {
            transform: translateY(2px);
        }

        .container.buttons-visible {
            padding-bottom: 100px;
        }

        .update-time {
            margin-top: 40px;
            font-size: 14px;
        }

        .update-time a {
            color: #ffeb3b;
            text-decoration: none;
        }

        .credit {
            margin-top: 10px; /* Adjusted margin to fit on separate line */
            font-size: 12px;
        }

        .contribute {
            display: block;
            color: #b2ff59; /* Light green color */
            text-decoration: none;
        }

        .contribute:hover {
            text-decoration: underline;
        }

        /* Styles for screens with a maximum width of 768px */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            p {
                font-size: 1em;
            }

            #searchBox {
                font-size: 16px;
                padding: 12px;
            }

            .button-container {
                flex-direction: column;
                align-items: center;
            }

            .action-button {
                width: 100%;
                justify-content: center;
            }
        }

        /* Styles for screens with a maximum width of 480px */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.8em;
            }

            p {
                font-size: 0.9em;
            }

            #searchBox {
                font-size: 14px;
                padding: 10px;
            }

            .container {
                padding: 30px;
            }

            .suggestion-list {
                width: 80%; /* Adjusted size for phone screens */
                max-width: none;
            }

            #searchBox {
                margin: 0 auto; /* Center the search box */
            }

            .update-time, .credit {
                position: static; /* Remove absolute positioning */
                text-align: center; /* Center align the text */
                display: block; /* Ensure they take up their own lines */
                margin-bottom: 10px; /* Add some space between them */
            }

            .credit {
                margin-top: 10px; /* Adjusted margin */
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>All in One English</h1>
        <p>Type a word or phrase and press Enter</p>
        <input type="text" id="searchBox" placeholder="Type here" autocomplete="off">
        
        <ul id="suggestionList" class="suggestion-list"></ul>

        <!-- Buttons will be dynamically added here -->
        <div id="buttonContainer" class="button-container"></div>
        <div class="update-time">
            Update 13:15 (UTC+7) 20/8<br>
            <a href="https://github.com/minhkhang1008/minhkhang1008.github.io" class="source-link" target="_blank">Source code</a><br>
            <a href="https://forms.gle/K195XSHSTdk8Jdh49" class="contribute" target="_blank">Contribute Words</a>
        </div>
        <div class="credit">Made by: Nguyen Hoang Minh Khang</div>
    </div>

    <script>
        let words = [];
        let lastInput = '';

        // Load words from the words.txt file
        fetch('words.txt')
            .then(response => response.text())
            .then(text => {
                words = text.split('\n').map(word => word.trim());
            });

        function convertTelexToEnglish(text) {
            // Define the mapping from Telex to English
            const mapping = {
                'ả': 'ar', 'ẻ': 'er', 'ủ': 'ur', 'ỉ': 'ir', 'ỏ': 'or',
                'é': 'es', 'ý': 'ys', 'ú': 'us', 'í': 'is', 'ó': 'os', 'á': 'as',
                'ẹ': 'ej', 'y': 'yj', 'ụ': 'uj', 'ị': 'ij', 'ọ': 'oj', 'ạ': 'aj',
                'è': 'ef', 'ý': 'yf', 'ù': 'uf', 'ò': 'of', 'à': 'af',
                'ẽ': 'ex', 'ỹ': 'yx', 'ũ': 'ux', 'ĩ': 'ix', 'õ': 'ox', 'ã': 'ax'
            };

            // Replace each character based on the mapping
            return text.split('').map(char => mapping[char] || char).join('');
        }

        document.getElementById('searchBox').addEventListener('input', function(event) {
            let input = event.target.value.trim().toLowerCase();
            let convertedInput = convertTelexToEnglish(input);
            let suggestionList = document.getElementById('suggestionList');
            suggestionList.innerHTML = ''; // Clear previous suggestions
            
            if (convertedInput) {
                let suggestions = words.filter(word => word.includes(convertedInput)).slice(0, 10);
                suggestions.forEach(suggestion => {
                    let listItem = document.createElement('li');
                    listItem.classList.add('suggestion-item');
                    listItem.innerHTML = highlightMatch(suggestion, convertedInput);
                    listItem.addEventListener('click', () => handleSuggestionClick(suggestion));
                    suggestionList.appendChild(listItem);
                });
            }
            
            lastInput = convertedInput; // Update last input
        });

        document.getElementById('searchBox').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                performAction(event.target.value.trim().toLowerCase());
                // Clear suggestions on Enter
                document.getElementById('suggestionList').innerHTML = '';
            }
        });

        function handleSuggestionClick(suggestion) {
            document.getElementById('searchBox').value = suggestion;
            performAction(suggestion);
            // Prevent the suggestion box from closing immediately
            setTimeout(() => {
                document.getElementById('suggestionList').innerHTML = '';
            }, 100);
        }

        function performAction(input) {
            let wordCount = input.split(/\s+/).length;
            let buttonContainer = document.getElementById('buttonContainer');
            let container = document.querySelector('.container');

            buttonContainer.innerHTML = ''; // Clear previous buttons
            container.classList.remove('buttons-visible'); // Remove class by default

            if (wordCount >= 2) {
                let phrasalVerbBtn = document.createElement('button');
                phrasalVerbBtn.classList.add('action-button', 'fade-in');
                phrasalVerbBtn.onclick = function () {
                    let urlSafeWord = input.replace(/\s+/g, '-');
                    clearButtons();
                    openUrl(`https://vietjack.com/cum-dong-tu/${urlSafeWord}.jsp`);
                };

                let googleTranslateBtn = document.createElement('button');
                googleTranslateBtn.classList.add('action-button', 'fade-in');
                googleTranslateBtn.onclick = function () {
                    let urlSafeText = input.replace(/\s+/g, '%20');
                    clearButtons();
                    openUrl(`https://translate.google.com/?sl=en&tl=vi&text=${urlSafeText}&op=translate`);
                };

                let googleSearchBtn = document.createElement('button');
                googleSearchBtn.classList.add('action-button', 'fade-in');
                googleSearchBtn.onclick = function () {
                    let urlSafeText = input.replace(/\s+/g, '+');
                    clearButtons();
                    openUrl(`https://www.google.com/search?q=${urlSafeText}`);
                };

                function updateButtonLabels() {
                    if (window.innerWidth <= 650) {
                        phrasalVerbBtn.innerHTML = '<img src="VJ.png" alt="VJ" class="icon"> Phrasal Verbs';
                        googleTranslateBtn.innerHTML = '<img src="ggtrans.png" alt="Google Translate" class="icon"> Google Translate';
                        googleSearchBtn.innerHTML = '<img src="google.png" alt="Google" class="icon"> Google Search';
                    } else {
                        phrasalVerbBtn.innerHTML = '<img src="VJ.png" alt="VJ" class="icon"> Phr. Verbs';
                        googleTranslateBtn.innerHTML = '<img src="ggtrans.png" alt="Google Translate" class="icon"> GG Trans';
                        googleSearchBtn.innerHTML = '<img src="google.png" alt="Google" class="icon"> GG Search';
                    }
                }

                updateButtonLabels();
                window.addEventListener('resize', updateButtonLabels); // Update button labels on resize

                buttonContainer.appendChild(phrasalVerbBtn);
                buttonContainer.appendChild(googleTranslateBtn);
                buttonContainer.appendChild(googleSearchBtn);

                // Add the class when buttons are created
                container.classList.add('buttons-visible');
            } else if (wordCount === 1) {
                // Direct the user to the dictionary if only one word is entered
                let urlSafeWord = input.replace(/\s+/g, '-');
                openUrl(`https://dictionary.cambridge.org/dictionary/english/${urlSafeWord}`);
            }
        }

        function clearButtons() {
            document.getElementById('buttonContainer').innerHTML = '';
            document.getElementById('searchBox').value = ''; // Clear the input field after button click
        }

        function clearInput() {
            document.getElementById('searchBox').value = '';
        }

        function openUrl(url) {
            if (window.innerWidth <= 800) {
                window.location.href = url;
            } else {
                window.open(url, '_blank');
            }
        }

        function highlightMatch(word, query) {
            let regex = new RegExp(`(${query})`, 'gi');
            return word.replace(regex, '<span class="highlight">$1</span>');
        }
    </script>
</body>

</html>
