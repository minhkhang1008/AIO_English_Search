<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All in One English</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js"></script>
</head>
<body>
    <div class="container">
        <h1>All in One English</h1>
        <p>Type a word or phrase and press Enter or click Quick Search</p>

        <div class="input-container">
            <input type="text" id="searchBox" placeholder="Type here" autocomplete="off">
            <button class="button" data-text="Quick Search" id="quickSearchButton">
                <span class="actual-text">&nbsp;Quick Search&nbsp;</span>
                <span aria-hidden="true" class="hover-text">&nbsp;Quick Search&nbsp;</span>
            </button>
        </div>

        <button id="settingsButton" class="settings-button">Settings</button>

        <div id="settingsContainer" class="settings-container hidden">
            <div class="api-selector">
                <label for="api-select">Select preset API Key:</label>
                <select id="api-select">
                    <option value="1">API Key 1</option>
                    <option value="2">API Key 2</option>
                    <option value="3">API Key 3</option>
                    <option value="4">API Key 4</option>
                </select>
            </div>

            <div class="api-instruction-link">
                <a href="GetAPI.html" target="_blank">How to Get Your Own API Key</a>
            </div>

            <div class="custom-api-inputs">
                <label for="customUid">Enter Your Own UID:</label>
                <input type="text" id="customUid" placeholder="UID" />
                <label for="customTokenId">Enter Your Own TokenID:</label>
                <input type="text" id="customTokenId" placeholder="TokenID" />
                <button id="saveCustomApiButton" class="save-button">Save</button>
            </div>
        </div>

        <ul id="suggestionList" class="suggestion-list"></ul>
        <div id="buttonContainer" class="button-container"></div>
        <div id="definitionContainer" class="definition-container hidden"></div>

        <button id="googleSignInButton" class="google-sign-in-button">Sign in with Google</button>
    </div>

    <script>
        async function initializeFirebase() {
            try {
                const response = await fetch('/api/firebaseConfig');
                const firebaseConfig = await response.json();
    
                // Ensure Firebase configuration is valid
                if (!firebaseConfig.apiKey) {
                    throw new Error('Firebase configuration is incomplete.');
                }
    
                // Initialize Firebase
                const app = firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
    
                // Handle Google Sign-In Button
                const googleSignInButton = document.getElementById('googleSignInButton');
                googleSignInButton.addEventListener('click', () => {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    auth.signInWithPopup(provider)
                        .then((result) => {
                            const user = result.user;
                            alert(`Welcome, ${user.displayName}`);
                            googleSignInButton.textContent = `Welcome, ${user.displayName}`;
                        })
                        .catch((error) => {
                            console.error('Sign-in error:', error);
                            alert('Failed to sign in. Please try again.');
                        });
                });
    
                // Update UI based on auth state
                auth.onAuthStateChanged((user) => {
                    if (user) {
                        googleSignInButton.textContent = `Welcome, ${user.displayName}`;
                    }
                });
            } catch (error) {
                console.error('Firebase initialization failed:', error);
            }
        }
    
        document.addEventListener('DOMContentLoaded', initializeFirebase);
    </script>
    <script src="script.js" defer></script>
</body>
</html>
