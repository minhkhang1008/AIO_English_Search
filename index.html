<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All in One English</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>All in One English</h1>
        <p>Type a word or phrase and press Enter or click Quick Search</p>
        
        <div class="input-container">
            <input type="text" id="searchBox" placeholder="Type here" autocomplete="off">
            <button class="button" data-text="Quick Search" id="quickSearchButton">
                <span class="actual-text">&nbsp;Quick Search&nbsp;</span>
                <span aria-hidden="true" class="hover-text">&nbsp;Quick Search&nbsp;</span>
            </button>
        </div>

        <button id="settingsButton" class="settings-button">Settings</button>

        <div id="settingsContainer" class="settings-container hidden">

            <div class="api-selector">
                <label for="api-select">Select preset API Key:</label>
                <select id="api-select">
                    <option value="1">API Key 1</option>
                    <option value="2">API Key 2</option>
                    <option value="3">API Key 3</option>
                    <option value="4">API Key 4</option>
                </select>
            </div>

            <div class="api-instruction-link">
                <a href="GetAPI.html" target="_blank">How to Get Your Own API Key</a>
            </div>

            <div class="custom-api-inputs">
                <label for="customUid">Enter Your Own UID:</label>
                <input type="text" id="customUid" placeholder="UID" />
                <label for="customTokenId">Enter Your Own TokenID:</label>
                <input type="text" id="customTokenId" placeholder="TokenID" />
                <button id="saveCustomApiButton" class="save-button">Save</button>
            </div>

            <div id="creditsContainer" class="credits-container">
                <div class="update-time">
                    Update 17/11/2024<br>
                    <a href="https://github.com/minhkhang1008/AIO_English_Search" class="source-link" target="_blank">Source code</a><br>
                    <a href="https://forms.gle/K195XSHSTdk8Jdh49" class="contribute" target="_blank">Contribute Words</a>
                </div>
                <div class="credit">Made by: Nguyen Hoang Minh Khang</div>
            </div>
        </div>

        <ul id="suggestionList" class="suggestion-list"></ul>
        <div id="buttonContainer" class="button-container"></div>

        <div id="definitionContainer" class="definition-container hidden"></div>
    </div>
    <script src="trie.js"></script>
    <script src="worker.js" type="text/javascript" defer></script>
    <script src="script.js" defer></script> 
</body>
</html>
