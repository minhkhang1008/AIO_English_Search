<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All in One</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.png">
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
            position: relative;
        }

        .highlight {
            background-color: #ffeb3b;
            color: black;
            font-weight: bold;
        }

        .suggestion-list {
            list-style-type: none;
            padding: 0;
            margin: 5px auto 0;
            max-height: 150px;
            overflow-y: auto;
            background-color: rgba(106, 17, 203, 0.9);
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 80%;
            max-width: 400px;
            color: #fff;
            position: absolute;
            z-index: 1000;
            left: 50%;
            transform: translateX(-50%);
        }

        .suggestion-item {
           padding: 10px;
           cursor: pointer;
           font-size: 18px;
           transition: background-color 0.3s, transform 0.3s ease-in-out;
        }

        .suggestion-item:hover {
           background-color: rgba(37, 117, 252, 0.9);
           color: #fff;
           transform: scale(1.05);
        }

        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            padding-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            width: 100%;
            max-width: 500px;
            margin: 0 20px;
            margin-bottom: 0;
        }

        h1 {
            font-size: 2.5em;
        }

        p {
            font-size: 1.2em;
        }

        #searchBox {
            width: 100%;
            max-width: 400px;
            padding: 14px;
            border: 2px solid #fff;
            border-radius: 30px;
            font-size: 18px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            position: relative;
            z-index: 1;
            margin: 0 auto;
        }

        #searchBox:focus {
            border-color: #ffeb3b;
            box-shadow: 0 0 10px #ffeb3b;
        }

        .suggestions-container {
            margin-top: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .suggestion-item:hover {
            background-color: #6a11cb;
            color: #fff;
        }

        .button-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .action-button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #6a11cb;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-button img.icon {
            width: 20px;
            height: 20px;
        }

        .action-button:hover {
            background-color: #2575fc;
        }

        .action-button:active {
            transform: translateY(2px);
        }

        .container.buttons-visible {
            padding-bottom: 40px;
        }

        .update-time {
            margin-top: 10px;
            font-size: 14px;
        }

        .update-time a {
            color: #ffeb3b;
            text-decoration: none;
        }

        .credit {
            margin-top: 5px;
            font-size: 12px;
        }

        .contribute {
            display: block;
            color: #b2ff59;
            text-decoration: none;
        }

        .contribute:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            p {
                font-size: 1em;
            }

            #searchBox {
                font-size: 16px;
                padding: 12px;
            }

            .button-container {
                flex-direction: column;
                align-items: center;
            }

            .action-button {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8em;
            }

            p {
                font-size: 0.9em;
            }

            #searchBox {
                font-size: 14px;
                padding: 10px;
            }

            .container {
                padding: 30px;
            }

            .suggestion-list {
                width: 80%;
                max-width: none;
            }

            #searchBox {
                margin: 0 auto;
            }

            .update-time, .credit {
                position: static;
                text-align: center;
                display: block;
                margin-bottom: 10px;
            }

            .credit {
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>All in One English</h1>
        <p>Type a word or phrase and press Enter</p>
        <input type="text" id="searchBox" placeholder="Type here" autocomplete="off">
        
        <ul id="suggestionList" class="suggestion-list"></ul>

        <div id="buttonContainer" class="button-container"></div>
        <div class="update-time">
            Update 13:15 (UTC+7) 20/8<br>
            <a href="https://github.com/minhkhang1008/minhkhang1008.github.io" class="source-link" target="_blank">Source code</a><br>
            <a href="https://forms.gle/K195XSHSTdk8Jdh49" class="contribute" target="_blank">Contribute Words</a>
        </div>
        <div class="credit">Made by: Nguyen Hoang Minh Khang</div>
    </div>

    <script>
        let words = [];
        let lastInput = '';

        fetch('words.txt')
            .then(response => response.text())
            .then(text => {
                words = text.split('\n').map(word => word.trim());
            });

        function convertTelexToEnglish(text) {
            const mapping = {
                'ả': 'ar', 'ẻ': 'er', 'ủ': 'ur', 'ỉ': 'ir', 'ỏ': 'or',
                'é': 'es', 'ý': 'ys', 'ú': 'us', 'í': 'is', 'ó': 'os', 'á': 'as',
                'ẹ': 'ej', 'y': 'yj', 'ụ': 'uj', 'ị': 'ij', 'ọ': 'oj', 'ạ': 'aj',
                'è': 'ef', 'ý': 'yf', 'ù': 'uf', 'ò': 'of', 'à': 'af', 'ô': 'oo', 'ố': 'oos', 'ồ': 'oof', 'ộ': 'ooj', 'ổ': 'oor', 'ỗ': 'oox', 'ỡ': 'owx',
                'ẽ': 'ex', 'ỹ': 'yx', 'ũ': 'ux', 'ĩ': 'ix', 'õ': 'ox', 'ã': 'ax',
                'ê': 'ee', 'ơ': 'ow', 'â': 'aa', 'ă': 'aw', 'ợ': 'owj', 'ễ': 'eex',
                'ớ': 'ows', 'ờ': 'owf', 'ế': 'ees', 'ề': 'eef', 'ệ': 'eej', 'ể': 'eer',
                'ấ': 'aas', 'ầ': 'aaf', 'ậ': 'aaj', 'ẫ': 'aax', 'ắ': 'aws', 'ằ': 'awf', 'ặ': 'awj', 'ẵ': 'awx'
            }; <!-- Need modification -->

            return text.split('').map(char => mapping[char] || char).join('');
        }

        document.getElementById('searchBox').addEventListener('input', function(event) {
            let input = event.target.value.trim().toLowerCase();
            let convertedInput = convertTelexToEnglish(input);
            
            // Update the search box with the converted input
            if (input !== convertedInput) {
                event.target.value = convertedInput;
            }

            let suggestionList = document.getElementById('suggestionList');
            suggestionList.innerHTML = ''; // Clear previous suggestions
            
            if (convertedInput) {
                let suggestions = words.filter(word => word.includes(convertedInput)).slice(0, 10);
                suggestions.forEach(suggestion => {
                    let listItem = document.createElement('li');
                    listItem.classList.add('suggestion-item');
                    listItem.innerHTML = highlightMatch(suggestion, convertedInput);
                    listItem.addEventListener('click', () => handleSuggestionClick(suggestion));
                    suggestionList.appendChild(listItem);
                });
            }
            
            lastInput = convertedInput; // Update last input
        });

        document.getElementById('searchBox').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                let input = convertTelexToEnglish(event.target.value.trim().toLowerCase());

                // Update the search box with the converted input before performing action
                event.target.value = input;

                performAction(input);
                // Clear suggestions on Enter
                document.getElementById('suggestionList').innerHTML = '';
            }
        });

        function handleSuggestionClick(suggestion) {
            let convertedSuggestion = convertTelexToEnglish(suggestion);
            document.getElementById('searchBox').value = convertedSuggestion;
            performAction(convertedSuggestion);
            // Prevent the suggestion box from closing immediately
            setTimeout(() => {
                document.getElementById('suggestionList').innerHTML = '';
            }, 100);
        }

        function highlightMatch(suggestion, input) {
            const regex = new RegExp(`(${input})`, 'gi');
            return suggestion.replace(regex, "<span class='highlight'>$1</span>");
        }

        function performAction(input) {
            let targetUrl;
            const switchOn = false; // Replace with actual switch state check

            if (switchOn) {
                targetUrl = `https://www.vietjack.com/cum-dong-tu/${input.replace(/\s+/g, '-')}.jsp`;
            } else {
                targetUrl = `https://www.google.com/search?q=${input}`;
            }

            window.location.href = targetUrl;
        }
    </script>
</body>

</html>
